baseURL: "https://omarshabana.netlify.app/"
locale: en-us
title: Omar Shabana
theme: ["PaperMod"]
menu:
  main:
    - name: Archive
      url: archives
      weight: 5
    - name: Search
      url: search/
      weight: 10
    - name: Tags
      url: tags/
      weight: 10
outputs:
  home:
    - HTML
    - RSS
    - JSON
params:
  ShowReadingTime: true
  ShowToc: true
  ShowBreadCrumbs: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  editPost:
    URL: "https://github.com/<path_to_repo>/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  homeInfoParams:
    Title: Hi there! 👋
    Content: My name is Omar. I'm a Software Engineer from Egypt. I'm interested in web, mobile development and ML/AI.

  socialIcons: # optional
    - name: "github"
      url: "https://github.com/Mirohhh"
    - name: "linkedin"
      url: "https://linkedin.com/in/omar-shabana11"
